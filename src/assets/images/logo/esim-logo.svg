<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none">
  <!-- SIM card icon -->
  <rect x="4" y="6" width="36" height="44" rx="5" fill="#0F172A"/>
  <polygon points="4,6 24,6 36,18 36,50 4,50" fill="#1E40AF"/>
  <polygon points="24,6 36,6 36,18" fill="#0F172A" opacity="0.5"/>
  <!-- chip -->
  <rect x="10" y="22" width="22" height="16" rx="3" fill="#60A5FA" opacity="0.9"/>
  <line x1="13" y1="22" x2="13" y2="38" stroke="#1E40AF" stroke-width="1.5"/>
  <line x1="17" y1="22" x2="17" y2="38" stroke="#1E40AF" stroke-width="1.5"/>
  <line x1="21" y1="22" x2="21" y2="38" stroke="#1E40AF" stroke-width="1.5"/>
  <line x1="25" y1="22" x2="25" y2="38" stroke="#1E40AF" stroke-width="1.5"/>
  <line x1="10" y1="27" x2="32" y2="27" stroke="#1E40AF" stroke-width="1.5"/>
  <line x1="10" y1="33" x2="32" y2="33" stroke="#1E40AF" stroke-width="1.5"/>
  <!-- signal arcs -->
  <path d="M42 28 Q50 20 58 28" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M42 28 Q54 14 66 28" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- dot at signal center -->
  <circle cx="42" cy="28" r="2.5" fill="#3B82F6"/>
  <!-- eSIM text -->
  <text x="74" y="37" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="#0F172A" letter-spacing="-1">e<tspan fill="#2563EB">SIM</tspan></text>
  <!-- demo badge -->
  <rect x="150" y="10" width="44" height="16" rx="4" fill="#DBEAFE"/>
  <text x="172" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#1D4ED8" text-anchor="middle" letter-spacing="1">DEMO</text>
</svg>
